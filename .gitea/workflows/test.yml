name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        # --frozen 跳过锁文件重解析，避免 uv 校验 ee/_license_core 编辑源（EE 私有路径）
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
