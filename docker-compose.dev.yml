# ============================================================
# DiskNext 本地开发依赖服务
# ============================================================
# 仅用于本地开发，启动 PostgreSQL 和 Redis。
#
# 启动:   docker compose -f docker-compose.dev.yml up -d
# 停止:   docker compose -f docker-compose.dev.yml down
# 清库:   docker compose -f docker-compose.dev.yml down -v
# ============================================================

services:
  postgres:
    image: postgres:latest
    container_name: disknext-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: disknext
      POSTGRES_USER: disknext
      POSTGRES_PASSWORD: 0bc2070c63fa470dfabaea99b493878a3dda4b9d9699806a
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - disknext-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disknext -d disknext"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:latest
    container_name: disknext-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - disknext-redis-data:/data
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "576fbd98ccb7c14931f00500b9a3b8226a55b70d7bcd3bb0"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "576fbd98ccb7c14931f00500b9a3b8226a55b70d7bcd3bb0", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  disknext-postgres-data:
  disknext-redis-data:
