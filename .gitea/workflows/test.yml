name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: disknext
          POSTGRES_PASSWORD: disknext_test
          POSTGRES_DB: disknext_test
        options: >-
          --health-cmd "pg_isready -U disknext"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://disknext:disknext_test@postgres:5432/disknext_test
          TEST_REDIS_URL: redis://redis:6379/15
          SECRET_KEY: ci-test-secret-key-do-not-use-in-production-0000000000000000
        run: uv run pytest tests/ -v --tb=short
